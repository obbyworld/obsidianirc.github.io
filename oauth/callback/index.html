<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sign-in complete</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#202225;
      color:#dcddde;
      font-family:system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .card{ max-width:28rem; padding:1.5rem; text-align:center; }
    h1{ font-size:1.25rem; margin:0 0 .5rem; }
    p{ color:#b9bbbe; margin:0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>OAuth sign-in</h1>
    <p id="msg">Completing sign-in...</p>
  </div>
  <script>
    // Standalone callback page: served as a static file at /oauth/callback so
    // it does NOT depend on the SPA bundle (which uses base="./" and would
    // 404 its assets when loaded from a deep URL). The popup runner in
    // src/lib/oauth.ts is listening for this exact postMessage shape.
    (function () {
      var qs = new URLSearchParams(window.location.search);
      var payload = {
        type: "obsidianirc:oauth-callback",
        state: qs.get("state") || "",
        code: qs.get("code") || undefined,
        error: qs.get("error") || undefined,
        errorDescription: qs.get("error_description") || undefined,
      };
      var msg = document.getElementById("msg");
      if (window.opener && window.opener !== window) {
        try {
          window.opener.postMessage(payload, window.location.origin);
          msg.textContent = "Sign-in complete. You can close this window.";
          setTimeout(function () { try { window.close(); } catch (_) {} }, 250);
          return;
        } catch (e) {
          msg.textContent =
            "Could not return tokens to the main window: " + (e && e.message);
          return;
        }
      }
      msg.textContent =
        "OAuth callback was loaded outside its popup. You can close this tab.";
    })();
  </script>
</body>
</html>
